<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="content">
        <h2>Yeni Soru Sor</h2>
        <hr/>
        <h:form>
            <div class="mb-3">
                <label>Soru Başlığı</label>
                <h:inputText value="#{questionBean.newQuestionTitle}" class="form-control" required="true" />
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Soru Kategorisi (Departman)</label>
                <h:selectOneMenu value="#{questionBean.newQuestionDepartment}" class="form-select bg-light" required="true">
                    <f:selectItem itemLabel="Lütfen Bir Kategori Seçin" itemValue="#{null}" />
                    <f:selectItems value="#{authBean.availableDepartments}" var="dept" itemValue="#{dept}" itemLabel="#{dept.label}" />
                </h:selectOneMenu>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Detaylar</label>
                <h:inputTextarea value="#{questionBean.newQuestionContent}" class="form-control" rows="10" required="true" />
            </div>
            <h:commandButton value="Soruyu Yayınla" action="#{questionBean.submitQuestion}" class="btn btn-success" />
        </h:form>
    </ui:define>
</ui:composition>
