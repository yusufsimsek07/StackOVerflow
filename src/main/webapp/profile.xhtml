<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="content">
        <h2>Profilim</h2>
        <hr/>
        <h:messages globalOnly="true" class="alert alert-info" />
        
        <div class="row mt-4">
            <div class="col-md-4 text-center">
                <img src="#{request.contextPath}/image?userId=#{authBean.currentUser.id}" class="rounded-circle img-thumbnail mb-3 avatar" width="200" height="200" alt="Profil Fotoğrafı"/>
                
                <h:form enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Fotoğraf (Sadece Galeri/Dosya)</label>
                        <h:inputFile value="#{profileBean.uploadedFile}" class="form-control mb-2" required="true"/>
                    </div>
                    <h:commandButton value="Fotoğrafı Yükle" action="#{profileBean.uploadProfilePicture}" class="btn btn-primary w-100" />
                </h:form>
            </div>
            <div class="col-md-8">
                <h4>Hesap Bilgileri</h4>
                <ul class="list-group mt-3">
                    <li class="list-group-item border-0 border-bottom"><b>Kullanıcı Adı:</b> #{authBean.currentUser.username}</li>
                    <li class="list-group-item border-0 border-bottom"><b>E-posta:</b> #{authBean.currentUser.email}</li>
                    <li class="list-group-item border-0 border-bottom"><b>Kayıt Tarihi:</b> #{authBean.currentUser.createdAt}</li>
                </ul>
            </div>
        </div>
    </ui:define>
</ui:composition>
