<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="content">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card hover-card p-4 border-top border-4" style="border-top-color:#f48024 !important;">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4 fw-bold so-orange">Giriş Yap</h3>
                        <h:messages globalOnly="true" class="alert alert-danger" />
                        
                        <h:form>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Kullanıcı Adı</label>
                                <h:inputText value="#{authBean.username}" class="form-control form-control-lg bg-light border-0" required="true" />
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Şifre</label>
                                <h:inputSecret value="#{authBean.password}" class="form-control form-control-lg bg-light border-0" required="true" />
                            </div>
                            <h:commandButton value="Giriş Yap" action="#{authBean.login}" class="btn btn-custom btn-lg w-100 rounded-pill mb-4 shadow-sm" />
                            
                            <div class="text-center text-muted">
                                Hesabınız yok mu? <br/>
                                <h:link outcome="register" class="text-decoration-none so-orange fw-bold fs-5">Hemen Kayıt Ol</h:link>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
